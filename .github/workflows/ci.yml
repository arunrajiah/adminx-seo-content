name: WordPress Plugin CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: [7.4, 8.0, 8.1, 8.2]
        wordpress-version: [5.0, 5.5, 6.0, latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl, gd, xml, zip
          ini-values: post_max_size=256M, upload_max_filesize=256M, max_execution_time=300
          coverage: xdebug

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Composer dependencies
        run: |
          composer install --prefer-dist --no-progress --no-suggest --optimize-autoloader
          composer global require wp-coding-standards/wpcs
          composer global require phpcompatibility/php-compatibility
          composer global require dealerdirect/phpcodesniffer-composer-installer

      - name: Configure PHPCS
        run: |
          ~/.composer/vendor/bin/phpcs --config-set installed_paths ~/.composer/vendor/wp-coding-standards/wpcs,~/.composer/vendor/phpcompatibility/php-compatibility
          ~/.composer/vendor/bin/phpcs --config-set default_standard WordPress

      - name: Validate PHP syntax
        run: find . -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run WordPress coding standards
        run: ~/.composer/vendor/bin/phpcs --standard=WordPress --extensions=php --ignore=*/vendor/*,*/node_modules/* ./

      - name: Run PHP Compatibility checks
        run: ~/.composer/vendor/bin/phpcs --standard=PHPCompatibility --runtime-set testVersion ${{ matrix.php-version }}- --extensions=php --ignore=*/vendor/*,*/node_modules/* ./

      - name: Security scan with Psalm
        run: |
          composer require --dev vimeo/psalm
          vendor/bin/psalm --init
          vendor/bin/psalm --show-info=false

      - name: Install WordPress test environment
        run: |
          bash bin/install-wp-tests.sh wordpress_test root '' localhost ${{ matrix.wordpress-version }}
        env:
          WP_VERSION: ${{ matrix.wordpress-version }}

      - name: Run PHPUnit tests
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "PHPUnit not found, skipping tests"
          fi

      - name: Check for security vulnerabilities
        run: |
          # Check for common security issues
          echo "Checking for potential security vulnerabilities..."
          
          # Check for SQL injection patterns
          if grep -r "wpdb->query.*\$" --include="*.php" . | grep -v "wpdb->prepare"; then
            echo "Potential SQL injection vulnerability found"
            exit 1
          fi
          
          # Check for XSS vulnerabilities
          if grep -r "echo.*\$_" --include="*.php" . | grep -v "esc_"; then
            echo "Potential XSS vulnerability found"
            exit 1
          fi
          
          # Check for file inclusion vulnerabilities
          if grep -r "include.*\$_" --include="*.php" .; then
            echo "Potential file inclusion vulnerability found"
            exit 1
          fi

      - name: Build plugin zip
        run: |
          mkdir -p build
          
          # Copy plugin files excluding development files
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='tests' --exclude='build' --exclude='.github' --exclude='composer.json' --exclude='package.json' --exclude='phpunit.xml' ./ build/adminx-seo-content/
          
          # Create zip file
          cd build
          zip -r adminx-seo-content.zip adminx-seo-content/
          
          # Verify zip contents
          unzip -l adminx-seo-content.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build-php${{ matrix.php-version }}-wp${{ matrix.wordpress-version }}
          path: build/adminx-seo-content.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-build-php8.1-wplatest
          path: ./

      - name: Deploy to WordPress.org (if configured)
        run: |
          echo "Deployment to WordPress.org would happen here"
          echo "Configure SVN credentials and deployment script for production use"
          # Uncomment and configure for actual deployment:
          # - name: WordPress Plugin Deploy
          #   uses: 10up/action-wordpress-plugin-deploy@stable
          #   env:
          #     SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          #     SVN_USERNAME: ${{ secrets.SVN_USERNAME }}

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-progress
          composer global require squizlabs/php_codesniffer
          composer global require phpmd/phpmd

      - name: Run PHP Mess Detector
        run: |
          ~/.composer/vendor/bin/phpmd . text cleancode,codesize,controversial,design,naming,unusedcode --exclude vendor,node_modules,tests

      - name: Check code complexity
        run: |
          find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -exec php -l {} \;

      - name: Generate code coverage report
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  performance-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, intl, gd, xml, zip

      - name: Install WordPress and plugin
        run: |
          # Set up WordPress for performance testing
          wget https://wordpress.org/latest.tar.gz
          tar -xzf latest.tar.gz
          
          # Configure WordPress
          cp wordpress/wp-config-sample.php wordpress/wp-config.php
          sed -i "s/database_name_here/wordpress_test/" wordpress/wp-config.php
          sed -i "s/username_here/root/" wordpress/wp-config.php
          sed -i "s/password_here//" wordpress/wp-config.php

      - name: Performance benchmarks
        run: |
          echo "Running performance benchmarks..."
          
          # Simulate plugin load time test
          php -r "
          \$start = microtime(true);
          include 'adminx-seo-content.php';
          \$end = microtime(true);
          \$load_time = \$end - \$start;
          echo 'Plugin load time: ' . \$load_time . ' seconds' . PHP_EOL;
          if (\$load_time > 0.1) {
            echo 'WARNING: Plugin load time exceeds 0.1 seconds' . PHP_EOL;
            exit(1);
          }
          "

      - name: Memory usage test
        run: |
          php -r "
          \$memory_before = memory_get_usage();
          include 'adminx-seo-content.php';
          \$memory_after = memory_get_usage();
          \$memory_used = \$memory_after - \$memory_before;
          echo 'Memory used: ' . number_format(\$memory_used / 1024 / 1024, 2) . ' MB' . PHP_EOL;
          if (\$memory_used > 10 * 1024 * 1024) {
            echo 'WARNING: Plugin uses more than 10MB of memory' . PHP_EOL;
            exit(1);
          }
          "